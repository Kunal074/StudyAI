<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyAI — Instant Study Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<!-- ══════════════════════════════════════
     NAVBAR — hamesha dikhega
══════════════════════════════════════ -->
<nav class="navbar" id="navbar">
  <div class="nav-logo">Study<em>AI</em></div>

  <div class="nav-right">
    <!-- Library button -->
    <button class="nav-btn" id="nav-library-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      My Notes
      <span class="nav-badge hidden" id="notes-badge">0</span>
    </button>

    <!-- User info + logout -->
    <div class="nav-user" id="nav-user">
      <div class="user-avatar" id="user-avatar">K</div>
      <span class="user-name" id="user-name">Kunal</span>
      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>
  </div>
</nav>

<!-- ══════════════════════════════════════
     PAGE 1 — HOMEPAGE
══════════════════════════════════════ -->
<main id="homepage" class="homepage">

  <header class="hero">
    <div class="logo-badge">AI</div>
    <h1 class="hero-title">Study<em>AI</em></h1>
    <p class="hero-sub">Search any topic. Get instant study notes.</p>
  </header>

  <!-- Search bar -->
  <form id="search-form" class="search-form" autocomplete="off">
    <div class="search-bar">
      <span class="search-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input
        id="search-input"
        type="text"
        placeholder="e.g. Photosynthesis, Recursion, Black Holes…"
        spellcheck="false"
      />
      <button type="submit" class="search-btn">Generate Notes</button>
    </div>
  </form>

  <!-- Suggestion chips -->
  <div class="suggestions">
    <span class="suggestion-label">Try:</span>
    <button class="chip" data-query="Quantum Entanglement">Quantum Entanglement</button>
    <button class="chip" data-query="Big O Notation">Big O Notation</button>
    <button class="chip" data-query="Photosynthesis">Photosynthesis</button>
    <button class="chip" data-query="French Revolution">French Revolution</button>
    <button class="chip" data-query="Recursion">Recursion</button>
  </div>

</main>

<!-- ══════════════════════════════════════
     PAGE 2 — RESULTS PAGE
══════════════════════════════════════ -->
<div id="results-page" class="results-page hidden">

  <!-- Top search bar -->
  <div class="top-bar">
    <button id="back-btn" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <form id="top-search-form" class="top-search-form" autocomplete="off">
      <input id="top-search-input" type="text" placeholder="Search a topic…"/>
      <button type="submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </form>
  </div>

  <div class="results-container">

    <!-- Loading state -->
    <div id="loading-state" class="loading-state hidden">
      <div class="spinner"></div>
      <p class="loading-text">Generating your study notes…</p>
      <div class="skeleton-card">
        <div class="sk sk-title"></div>
        <div class="sk sk-line"></div>
        <div class="sk sk-line short"></div>
        <div class="sk sk-gap"></div>
        <div class="sk sk-line"></div>
        <div class="sk sk-line short"></div>
      </div>
    </div>

    <!-- Error state -->
    <div id="error-state" class="error-state hidden">
      <div class="error-icon">⚠</div>
      <p id="error-message">Something went wrong.</p>
      <button id="retry-btn" class="retry-btn">Try Again</button>
    </div>

    <!-- Notes card -->
    <article id="notes-card" class="notes-card hidden"></article>

  </div>
</div>

<!-- ══════════════════════════════════════
     PAGE 3 — LIBRARY PAGE
══════════════════════════════════════ -->
<div id="library-page" class="library-page hidden">

  <div class="library-header">
    <button id="lib-back-btn" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <h2 class="library-title">My Notes</h2>
    <div style="flex:1"></div>

    <!-- Search in library -->
    <div class="lib-search-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="lib-search" type="text" placeholder="Search saved notes…"/>
    </div>
  </div>

  <div class="library-container">
    <!-- Empty state -->
    <div id="library-empty" class="library-empty hidden">
      <div class="empty-icon">📚</div>
      <p>No notes saved yet.</p>
      <p class="empty-sub">Search a topic and click "Save to Library"</p>
      <button id="lib-search-btn" class="search-btn" style="margin-top:20px">
        Start Searching
      </button>
    </div>

    <!-- Notes grid -->
    <div id="library-grid" class="library-grid"></div>
  </div>

</div>

<!-- ══════════════════════════════════════
     MODAL — Full note view
══════════════════════════════════════ -->
<div id="note-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <button id="modal-close" class="modal-close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
